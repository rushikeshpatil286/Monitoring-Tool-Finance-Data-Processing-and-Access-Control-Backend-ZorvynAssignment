<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Monitor Pro</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Link to external CSS -->
    <link rel="stylesheet" href="/login/login.css">
</head>
<body>

    <div class="login-card">
        <div class="brand-logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 20v-6M6 20V10M18 20V4"/>
            </svg>
        </div>

        <div class="header-title">
            <h1>Welcome back</h1>
            <p>Enter your credentials to access your dashboard.</p>
        </div>

        <form action="/login" method="post" id="loginForm">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" name="username" id="email" class="input-modern" placeholder="name@company.com" required>
            </div>

            <div class="form-group">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <label class="form-label mb-0">Password</label>
                    <a href="#" class="text-link-small">Forgot password?</a>
                </div>
                <input type="password" name="password" id="password" class="input-modern" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-modern" id="submitBtn">Sign In</button>
        </form>

        <div class="divider">or</div>

        <div class="footer-links">
            Don't have an account? <a href="/userform/userform.html">Get started</a>
        </div>
    </div>

    <!-- Link to external JS -->
    <script src="/login/login.js"></script>
</body>
</html>
